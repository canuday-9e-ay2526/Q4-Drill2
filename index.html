<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 1</title>
    <link rel="stylesheet" href="styles.css">
    <!-- GOOGLE FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Saira:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body>
        <div class="container2">
                 <div class="row">
            <div class="col-12 col-md-6 col-lg-6">
                <h1>Heat Index Checker</h1>
                <details ontoggle="Note()">
                <summary>Note</summary>
                    <p>Input the temperature (ºC) and humidity (%), then click Check to see the Heat index and its status</p>
                    </details>
                    <br>
              
                <form>
                <p>Temperature in ºC</p>
                    <input type="number" class="form-control" id="temp" placeholder="input degree value">
                    <br>
                <p>Humidity in %</p>
                    <input type="number" class="form-control" id="humid" placeholder="input percentage value">
                </form>
                <br>
                <button type="submit" class="btn btn-warning" 
                onclick="checkHeat()">Check</button>
                <button type="button" class="btn btn-success" onclick="window.location.reload()">Refresh</button>
               </div>
                <div class="col-12 col-md-6 col-lg-6">
                
                <img src="Heat.png" alt="IndexLogo" width="150px" border-radius: 30px>
                </div>

        </div>

     
    
    </div>
 
</div>

<script src="main.js"></script>
</body>
</html>
